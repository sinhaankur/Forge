name: Forge
options:
  bundleIdPrefix: com.sinhaankur.forge
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "DS8C97S284"  # Ankur Sinha (Personal Team)
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

targets:
  # ---------------- iOS app ----------------
  Glow:
    type: application
    platform: iOS
    sources:
      - path: Glow
    dependencies:
      - target: GlowWatch
        embed: true
    settings:
      base:
        PRODUCT_NAME: Forge
        PRODUCT_BUNDLE_IDENTIFIER: com.sinhaankur.forge
        # HealthKit entitlement disabled for free-account direct install.
        # Re-enable for TestFlight (paid account): uncomment the line below.
        # CODE_SIGN_ENTITLEMENTS: Glow/Glow.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    info:
      path: Glow/Info.plist
      properties:
        CFBundleDisplayName: Forge
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        NSHealthShareUsageDescription: "Forge reads your active energy, steps, and workouts on this device to fill in workout-target progress and show your stats. This data never leaves your iPhone."
        NSHealthUpdateUsageDescription: "Forge does not write any data to Health. It only reads, on your device."

  # ---------------- watchOS app ----------------
  GlowWatch:
    type: application
    platform: watchOS
    sources:
      - path: GlowWatch
      # Shared connectivity layer (Codable snapshot + WCSession wrapper).
      - path: Glow/Services/ConnectivityService.swift
    settings:
      base:
        PRODUCT_NAME: Forge
        PRODUCT_BUNDLE_IDENTIFIER: com.sinhaankur.forge.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"
    info:
      path: GlowWatch/Info.plist
      properties:
        CFBundleDisplayName: Forge
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.sinhaankur.forge

schemes:
  Forge:
    build:
      targets:
        Glow: all
        GlowWatch: all
    run:
      config: Debug
