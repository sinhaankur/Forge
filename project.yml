name: Forge
options:
  bundleIdPrefix: com.sinhaankur.forge
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""  # Set your own Apple Team ID (or via a local override) for device/TestFlight builds
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

targets:
  # ---------------- iOS app ----------------
  Glow:
    type: application
    platform: iOS
    sources:
      - path: Glow
    dependencies:
      - target: GlowWatch
        embed: true
    settings:
      base:
        PRODUCT_NAME: Forge
        PRODUCT_BUNDLE_IDENTIFIER: com.sinhaankur.forge
        # HealthKit entitlement disabled for free-account direct install.
        # Re-enable for TestFlight (paid account): uncomment the line below.
        # CODE_SIGN_ENTITLEMENTS: Glow/Glow.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        # Broaden device support: iPhone + iPad natively, plus run on Apple
        # Silicon Macs ("Designed for iPad") and Vision Pro (compatibility).
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    info:
      path: Glow/Info.plist
      properties:
        CFBundleDisplayName: Forge
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        NSHealthShareUsageDescription: "Forge reads your active energy, steps, sleep, and workouts on this device to fill in progress and readiness. This data never leaves your iPhone."
        NSHealthUpdateUsageDescription: "Forge does not write any data to Health. It only reads, on your device."
        NSCalendarsUsageDescription: "Forge reads your calendar on this device to find free time around your meetings and schedule workout & warm-up reminders. Your events never leave your iPhone."
        NSCalendarsFullAccessUsageDescription: "Forge reads your calendar on this device to find free time around your meetings and schedule workout & warm-up reminders. Your events never leave your iPhone."
        NSRemindersFullAccessUsageDescription: "Forge can read your calendar to plan reminders around your day. Nothing leaves your device."
        NSPhotoLibraryUsageDescription: "Forge lets you pick a profile photo. The image is stored only on this device."
        NSMotionUsageDescription: "Forge reads your motion & fitness activity (steps, walking/running) on this device to track your daily movement and recovery. This never leaves your iPhone."

  # ---------------- watchOS app ----------------
  GlowWatch:
    type: application
    platform: watchOS
    sources:
      - path: GlowWatch
      # Shared connectivity layer (Codable snapshot + WCSession wrapper).
      - path: Glow/Services/ConnectivityService.swift
    settings:
      base:
        PRODUCT_NAME: Forge
        PRODUCT_BUNDLE_IDENTIFIER: com.sinhaankur.forge.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"
    info:
      path: GlowWatch/Info.plist
      properties:
        CFBundleDisplayName: Forge
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.sinhaankur.forge

schemes:
  Forge:
    build:
      targets:
        Glow: all
        GlowWatch: all
    run:
      config: Debug
